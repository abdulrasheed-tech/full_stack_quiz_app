<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Revise difficult MCQs - review questions you got wrong in previous quizzes.">
  <title>Revision – MCQ App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            primary: { 50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81' },
            surface: { 50:'#f8fafc',100:'#f1f5f9',200:'#e2e8f0',800:'#1e293b',900:'#0f172a' }
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
</head>
<body class="min-h-screen bg-neutral-950 bg-gradient-to-br from-neutral-900 via-slate-900 to-amber-950/30 text-neutral-100 antialiased font-sans p-4 md:p-0">

<nav id="navbar" class="fixed top-0 left-0 right-0 z-50 backdrop-blur-xl bg-surface-900/70 border-b border-white/10 flex items-center justify-between px-6 py-3.5 shadow-lg"></nav>

<!-- Full-screen revision quiz container -->
<main class="fixed inset-0 pt-[60px] flex flex-col">
  <!-- Top bar: title + progress -->
  <div id="quiz-header" class="hidden px-4 sm:px-8 py-4 border-b border-white/5 flex-shrink-0">
    <div class="max-w-2xl mx-auto">
      <div class="flex items-center justify-between mb-2">
        <div class="flex items-center gap-2">
          <span class="text-amber-400 font-bold text-sm">&#128257; REVISION MODE</span>
          <span class="text-slate-500 text-xs" id="question-label">Question 1 of 10</span>
        </div>
        <span class="text-sm font-semibold text-amber-300">
          <span id="progress-count">0</span> answered
        </span>
      </div>
      <div class="w-full h-1.5 bg-white/10 rounded-full overflow-hidden">
        <div id="progress-bar" class="h-full bg-gradient-to-r from-amber-500 to-orange-400 rounded-full transition-all duration-500 ease-out" style="width:0%"></div>
      </div>
      <div id="question-dots" class="flex flex-wrap gap-1.5 mt-3 justify-center"></div>
    </div>
  </div>

  <!-- Question area -->
  <div id="quiz" class="flex-1 flex items-center justify-center px-4 sm:px-8 overflow-hidden">
    <div class="flex flex-col items-center gap-3 py-16" id="quiz-loader">
      <div class="spinner"></div>
      <p class="text-slate-400 text-sm">Loading revision questions...</p>
    </div>
  </div>

  <!-- Bottom bar: navigation -->
  <div id="quiz-nav" class="hidden px-4 sm:px-8 py-4 border-t border-white/5 flex-shrink-0">
    <div class="max-w-2xl mx-auto flex items-center justify-between gap-4">
      <button onclick="prevQuestion()" id="prev-btn"
        class="px-5 py-2.5 bg-white/5 border border-white/10 text-slate-300 font-medium rounded-xl hover:bg-white/10 transition-all duration-200 text-sm disabled:opacity-30 disabled:cursor-not-allowed flex items-center gap-2">
        <span>&#8592;</span> Previous
      </button>
      <button onclick="exitQuiz()" id="exit-btn"
        class="px-4 py-2.5 bg-red-500/10 border border-red-500/20 text-red-400 font-medium rounded-xl hover:bg-red-500/20 transition-all duration-200 text-sm flex items-center gap-2">
        &#10005; Exit
      </button>
      <button onclick="nextQuestion()" id="next-btn"
        class="px-5 py-2.5 bg-gradient-to-r from-amber-500 to-orange-500 text-white font-semibold rounded-xl hover:shadow-lg hover:shadow-amber-500/25 transition-all duration-200 text-sm flex items-center gap-2">
        Next <span>&#8594;</span>
      </button>
    </div>
  </div>

  <!-- Submit bar -->
  <div id="submit-bar" class="hidden px-4 sm:px-8 py-4 border-t border-white/5 flex-shrink-0">
    <div class="max-w-2xl mx-auto flex items-center justify-center gap-4">
      <button onclick="exitQuiz()" id="exit-btn-2"
        class="px-6 py-3 bg-white/10 border border-white/10 text-white font-semibold rounded-xl hover:bg-white/15 transition-all duration-200 text-sm">
        &#127968; Back to Chapters
      </button>
    </div>
  </div>
</main>

<span id="progress-total" class="hidden">0</span>

<div id="toast-container" class="fixed bottom-6 right-6 z-[200] flex flex-col-reverse gap-2"></div>

<script src="../script.js"></script>
</body>
</html>
